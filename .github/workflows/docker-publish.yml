name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Vendor turntf-js SDK
        run: |
          git clone --depth 1 https://github.com/tursom/turntf-js.git _sdk
          cd _sdk && npm install --omit=dev && npm run build && cd ..
          mkdir -p vendor/turntf-js
          cp -r _sdk/dist   vendor/turntf-js/
          cp -r _sdk/proto  vendor/turntf-js/
          node -e "const p=require('./_sdk/package.json');const d={name:p.name,version:p.version,type:p.type,main:p.main,module:p.module,types:p.types,exports:p.exports,dependencies:p.dependencies};require('fs').writeFileSync('vendor/turntf-js/package.json',JSON.stringify(d,null,2))"
          rm -rf _sdk

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
